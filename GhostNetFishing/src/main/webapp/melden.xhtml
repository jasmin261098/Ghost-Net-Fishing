<?xml version='1.0' encoding='UTF-8' ?>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:p="http://primefaces.org/ui">
<h:head>
	<title>Ghost Net Fishing</title>
	<link rel="stylesheet" type="text/css" media="screen" href="styles.css" />
</h:head>
<h:body>
	<h:panelGroup layout="block" styleClass="header">
		<h:graphicImage value="#{resource['images/Sea-Shepherd_Logo.jpg']}" 
						library="images" 
						alt="Sea Shepherd Logo"
						style="height: 175px; width: auto;"/>
		<h1>Geisternetz melden</h1>
	</h:panelGroup>
	
	<!-- Formular zum Melden eines Geisternetzes -->
	<h:form>
	    <h:panelGrid columns="2" cellpadding="5">
	        <h:outputLabel for="standort" value="Standort (Längen- und Breitengrad):" />
	        <h:inputText id="standort" value="#{geisternetzForm.geisternetz.standort}" required="true" />
	        
	        <h:outputLabel for="größe" value="Geschätzte Größe (in m²):" />
	        <h:inputText id="größe" value="#{geisternetzForm.geisternetz.größe}" required="true" />
	        
	        <h:commandButton value="Melden" action="#{geisternetzForm.meldeGeisternetz}" />
	    </h:panelGrid>
	</h:form>
</h:body>
</html>
